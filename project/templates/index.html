<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SDN Control & Topology Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Vis Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --primary-color: #3b82f6;
        --danger-color: #ef4444;
        --success-color: #10b981;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }

      h1, h2 {
        font-weight: 800;
        margin-top: 0;
        letter-spacing: -0.5px;
      }

      h1 {
        text-align: center;
        background: linear-gradient(90deg, #60a5fa, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 30px;
        font-size: 2.5rem;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
      }

      @media (min-width: 1024px) {
        .container {
          grid-template-columns: 350px 1fr;
        }
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 24px;
        border-radius: 16px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .card h2 {
        font-size: 1.25rem;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .card h2::before {
        content: '';
        display: block;
        width: 8px;
        height: 24px;
        background: var(--primary-color);
        border-radius: 4px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      input[type="text"] {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 12px 16px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--primary-color);
      }

      .button-group {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        color: white;
        transition: opacity 0.2s, transform 0.1s;
      }

      button.block-btn {
        background: var(--danger-color);
      }

      button.unblock-btn {
        background: var(--success-color);
      }

      button:hover {
        opacity: 0.9;
      }

      button:active {
        transform: scale(0.98);
      }

      #result {
        margin-top: 15px;
        padding: 15px;
        background: rgba(0,0,0,0.3);
        border-radius: 8px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-wrap: break-word;
        border: 1px solid var(--border-color);
        min-height: 80px;
      }

      .main-content {
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-width: 0;
      }

      #topology-network {
        width: 100%;
        height: 450px;
        background: rgba(15, 23, 42, 0.5);
        border-radius: 12px;
        border: 1px solid var(--border-color);
      }

      .grafana-container {
        width: 100%;
        height: 600px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-color);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .legend-container {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 15px;
        font-size: 0.85rem;
        background: rgba(0,0,0,0.3);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .legend-color {
        width: 16px;
        height: 16px;
        border-radius: 4px;
      }
      .legend-line {
        width: 24px;
        height: 3px;
      }
      .legend-dashed {
        width: 24px;
        height: 2px;
        border-bottom: 2px dashed rgba(255,255,255,0.6);
      }
      
      .status-indicator {
        font-size: 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--text-secondary);
        margin-top: 10px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <h1>SDN Intelligence Center</h1>

    <div class="container">
      <!-- Left Panel: Control -->
      <aside>
        <div class="card">
          <h2>Security Control</h2>
          <div class="form-group">
            <input type="text" id="ip" placeholder="Enter IP Address (e.g. 10.0.0.1)" />
          </div>
          <div class="button-group">
            <button class="block-btn" onclick="blockIP()">Block IP</button>
            <button class="unblock-btn" onclick="unblockIP()">Unblock IP</button>
          </div>
          <div id="result">Response output will appear here...</div>
        </div>
      </aside>

      <!-- Right Panel: Vis & Monitoring -->
      <main class="main-content">
        <div class="card">
          <h2>Network Topology</h2>
          <div class="legend-container">
            <div class="legend-item"><div class="legend-color" style="background: #2563eb; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div><span>Switch</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #059669; border-radius: 50%;"></div><span>Host</span></div>
            <div class="legend-item"><div class="legend-line" style="background: #10b981;"></div><span>Main Link (Cepat)</span></div>
            <div class="legend-item"><div class="legend-line" style="background: #f59e0b;"></div><span>Backup Link (Lambat)</span></div>
            <div class="legend-item"><div class="legend-line" style="background: #94a3b8;"></div><span>Unknown Link</span></div>
            <div class="legend-item"><div class="legend-dashed"></div><span>Kabel Host</span></div>
          </div>
          <div id="topology-network"></div>
          <div class="status-indicator">
            <div class="status-dot tooltip" id="topo-status-dot"></div>
            <span id="topo-status-text">Fetching topology data...</span>
          </div>
        </div>

        <div class="card" style="padding: 0; border: none; background: transparent; box-shadow: none;">
          <h2 style="padding: 0 10px;">Metrics & Monitoring</h2>
          <div class="grafana-container">
            <iframe src="http://103.183.74.87:3000/public-dashboards/8bc610f47c9b4b6a9c077196f287a392"></iframe>
          </div>
        </div>
      </main>
    </div>

    <script>
      // API call helper
      async function triggerAPI(endpoint, ip) {
        if (!ip) {
          document.getElementById("result").innerText = "Please enter an IP address.";
          return;
        }

        document.getElementById("result").innerText = "Processing...";
        
        try {
          const res = await fetch(`/${endpoint}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ip: ip }),
          });
          const data = await res.json();
          document.getElementById("result").innerText = JSON.stringify(data, null, 2);
        } catch (e) {
          document.getElementById("result").innerText = `Error: ${e.message}`;
        }
      }

      function blockIP() { triggerAPI("block_ip", document.getElementById("ip").value); }
      function unblockIP() { triggerAPI("unblock_ip", document.getElementById("ip").value); }

      // Vis-Network Topology Logic
      let network = null;
      let nodesDataset = new vis.DataSet();
      let edgesDataset = new vis.DataSet();
      let previousStats = {};
      
      async function drawTopology() {
        try {
          const res = await fetch('/api/topology');
          const data = await res.json();
          
          if (data.status !== 'success') throw new Error(data.message || 'Failed to fetch topology');

          document.getElementById('topo-status-text').innerText = `Live: ${data.switches.length} Switches, ${data.hosts.length} Hosts`;
          document.getElementById('topo-status-dot').style.backgroundColor = 'var(--success-color)';

          const activeNodes = new Set();
          const activeEdges = new Set();

          // Switches
          if (data.switches) {
            data.switches.forEach(sw => {
              activeNodes.add(sw.dpid);
              nodesDataset.update({
                id: sw.dpid,
                label: `Switch\nDPID: ${parseInt(sw.dpid, 16)}`,
                group: 'switch',
                shape: 'hexagon',
                color: { background: '#2563eb', border: '#60a5fa' },
                font: { color: '#ffffff', size: 14 },
                size: 30
              });
            });
          }

          // Hosts
          if (data.hosts) {
            data.hosts.forEach(host => {
              activeNodes.add(host.mac);
              const ip = (host.ipv4 && host.ipv4.length > 0) ? host.ipv4[0] : 'Unknown IP';
              nodesDataset.update({
                id: host.mac,
                label: `Host\n${ip}\n${host.mac}`,
                group: 'host',
                shape: 'dot',
                color: { background: '#059669', border: '#34d399' },
                font: { color: '#ffffff', size: 14 },
                size: 18
              });

              if (host.port && host.port.dpid) {
                const edgeId = `host-${host.mac}-${host.port.dpid}`;
                activeEdges.add(edgeId);
                const existingEdge = edgesDataset.get(edgeId);
                if (!existingEdge || existingEdge._animating === undefined) {
                    edgesDataset.update({
                      id: edgeId,
                      from: host.mac,
                      to: host.port.dpid,
                      color: { color: 'rgba(255,255,255,0.4)' },
                      width: 2,
                      dashes: true,
                      isSwitchLink: false,
                      srcDpid: host.port.dpid,
                      srcPort: host.port.port_no,
                      _animating: false
                    });
                }
              }
            });
          }

          // Links
          if (data.links) {
            data.links.forEach(link => {
              const src = link.src.dpid;
              const dst = link.dst.dpid;
              const srcPort = link.src.port_no;
              const dstPort = link.dst.port_no;
              
              const isSrcSmaller = src < dst;
              const normalizedEdgeId = isSrcSmaller ? `${src}:${srcPort}-${dst}:${dstPort}` : `${dst}:${dstPort}-${src}:${srcPort}`;
              activeEdges.add(normalizedEdgeId);
              
              let linkColor = '#94a3b8';
              let linkLabel = '';
              
              const isBackup = (srcPort === "00000005" || dstPort === "00000005" || srcPort === "00000003" || dstPort === "00000003" || (src === "0000000000000002" && srcPort === "00000004") || (dst === "0000000000000002" && dstPort === "00000004"));
              
              if (isBackup) {
                   linkColor = '#f59e0b'; linkLabel = 'Backup';
              } else {
                   linkColor = '#10b981'; linkLabel = 'Main';
              }

              const existing = edgesDataset.get(normalizedEdgeId);
              if (!existing || existing.label === 'DEAD' || existing._animating === undefined) {
                  edgesDataset.update({
                    id: normalizedEdgeId,
                    from: src,
                    to: dst,
                    color: { color: linkColor },
                    label: linkLabel,
                    font: {color: '#f8fafc', size: 14, align: 'top', strokeWidth: 3, strokeColor: '#000000'},
                    width: 3,
                    dashes: false,
                    isSwitchLink: true,
                    srcDpid: src, srcPort: srcPort,
                    dstDpid: dst, dstPort: dstPort,
                    baseColor: linkColor, baseLabel: linkLabel,
                    _animating: false
                  });
              }
            });
          }

          // Deteksi Kabel Mati
          edgesDataset.forEach(edge => {
             if (edge.isSwitchLink && !activeEdges.has(edge.id) && edge.label !== 'DEAD') {
                 edgesDataset.update({
                     id: edge.id,
                     color: { color: '#ef4444' }, // Merah bata
                     label: 'DEAD',
                     dashes: [10, 10],
                     width: 4,
                     font: {color: '#fca5a5', size: 14, align: 'top', strokeWidth: 3, strokeColor: '#450a0a'},
                     _animating: false
                 });
             }
             if (!edge.isSwitchLink && !activeEdges.has(edge.id)) {
                 edgesDataset.remove(edge.id);
             }
          });

          nodesDataset.forEach(node => {
             if (!activeNodes.has(node.id)) {
                 nodesDataset.remove(node.id);
             }
          });

          if (!network) {
            const container = document.getElementById('topology-network');
            const graphData = { nodes: nodesDataset, edges: edgesDataset };
            const options = {
              layout: {
                randomSeed: 8 // Angka seed paten agar orientasi selalu sejajar sama tiap kali refresh (landscape)
              },
              physics: {
                solver: 'forceAtlas2Based',
                forceAtlas2Based: { gravitationalConstant: -100, centralGravity: 0.01, springLength: 150, springConstant: 0.1 }
              },
              edges: { smooth: { type: 'dynamic', roundness: 0.5 } },
              interaction: { hover: true, tooltipDelay: 200 }
            };
            network = new vis.Network(container, graphData, options);
          }

        } catch (e) {
          console.error(e);
          document.getElementById('topo-status-text').innerText = `Error: ${e.message}`;
          document.getElementById('topo-status-dot').style.backgroundColor = 'var(--danger-color)';
        }
      }

      async function fetchTraffic() {
         if (!network || edgesDataset.length === 0) return;
         try {
             const res = await fetch('/api/traffic_stats');
             const data = await res.json();
             if (data.status === 'success') {
                 const currentStats = data.stats;
                 
                 edgesDataset.forEach(edge => {
                    if (edge.isSwitchLink && edge.label !== 'DEAD' && edge.srcDpid && edge.dstDpid) {
                       let tx1 = currentStats[edge.srcDpid] && currentStats[edge.srcDpid][edge.srcPort] ? currentStats[edge.srcDpid][edge.srcPort].tx : 0;
                       let tx2 = currentStats[edge.dstDpid] && currentStats[edge.dstDpid][edge.dstPort] ? currentStats[edge.dstDpid][edge.dstPort].tx : 0;
                       let prevTx1 = previousStats[edge.srcDpid] && previousStats[edge.srcDpid][edge.srcPort] ? previousStats[edge.srcDpid][edge.srcPort].tx : tx1;
                       let prevTx2 = previousStats[edge.dstDpid] && previousStats[edge.dstDpid][edge.dstPort] ? previousStats[edge.dstDpid][edge.dstPort].tx : tx2;
                       
                       let delta1 = tx1 - prevTx1;
                       let delta2 = tx2 - prevTx2;
                       
                       // Threshold trafik logik. Angka dinaikkan ke 400 untuk mengabaikan paket kecil seperti LLDP/Echo ryu
                       if (delta1 > 400 || delta2 > 400) {  
                           // Animasi Active Traffic Pulse!
                           edgesDataset.update({
                               id: edge.id, 
                               color: { color: '#0ea5e9' }, // Cyan Terang
                               width: 8,
                               font: {color: '#ffffff', size: 16, align: 'top', strokeWidth: 4, strokeColor: '#000000'},
                               label: (edge.baseLabel || "") + ' (Active Ping)',
                               _animating: true
                           });
                       } else {
                           // Kembalikan ke normal jika traffic berhenti dan sebelumnya menyala
                           if (edge._animating) {
                               edgesDataset.update({
                                   id: edge.id,
                                   color: { color: edge.baseColor },
                                   width: 3,
                                   font: {color: '#f8fafc', size: 14, align: 'top', strokeWidth: 3, strokeColor: '#000000'},
                                   label: edge.baseLabel,
                                   _animating: false
                               });
                           }
                       }
                    }

                    // --- TAMBAHAN BARU: Animasi Khusus untuk Kabel Host ---
                    if (!edge.isSwitchLink && edge.srcDpid && edge.srcPort) {
                       let tx = currentStats[edge.srcDpid] && currentStats[edge.srcDpid][edge.srcPort] ? currentStats[edge.srcDpid][edge.srcPort].tx : 0;
                       let rx = currentStats[edge.srcDpid] && currentStats[edge.srcDpid][edge.srcPort] ? currentStats[edge.srcDpid][edge.srcPort].rx : 0;
                       
                       let prevTx = previousStats[edge.srcDpid] && previousStats[edge.srcDpid][edge.srcPort] ? previousStats[edge.srcDpid][edge.srcPort].tx : tx;
                       let prevRx = previousStats[edge.srcDpid] && previousStats[edge.srcDpid][edge.srcPort] ? previousStats[edge.srcDpid][edge.srcPort].rx : rx;
                       
                       let deltaTx = tx - prevTx;
                       let deltaRx = rx - prevRx;
                       
                       // Ping dari/ke host.
                       if (deltaTx > 200 || deltaRx > 200) {  
                           edgesDataset.update({
                               id: edge.id, 
                               color: { color: '#a855f7' }, // Purple/Pink menyala tebal menunjukkan traffic Personal Host
                               width: 6,
                               dashes: false, // Ubah jadi solid sementara agar terlihat aliran
                               font: {color: '#ffffff', size: 14, align: 'top', strokeWidth: 3, strokeColor: '#000000'},
                               label: 'Sending Data',
                               _animating: true
                           });
                       } else {
                           if (edge._animating) {
                               edgesDataset.update({
                                   id: edge.id,
                                   color: { color: 'rgba(255,255,255,0.4)' },
                                   width: 2,
                                   dashes: true, // Kembali transparan dan putus-putus
                                   label: undefined, // Hapus label
                                   _animating: false
                               });
                           }
                       }
                    }
                 });
                 previousStats = currentStats;
             }
         } catch(e) {}
      }

      // Initialize
      drawTopology();
      
      // Refresh topology architecture every 10 seconds
      setInterval(drawTopology, 10000);
      
      // Polling traffic stats independently every 2 seconds for pulse animation
      setInterval(fetchTraffic, 2000);
    </script>
  </body>
</html>
