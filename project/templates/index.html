{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SDN Control & Topology Dashboard</title>
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vis Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <!-- Added cache busting v=3 to ensure refresh -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
  </head>
  <body>
    <!-- Overlay UI Header -->
    <div class="top-nav">
       <div class="toggle-group">
          <button class="toggle-btn active"><i class="fa-solid fa-bolt"></i> Real time</button>
          <button class="toggle-btn"><i class="fa-solid fa-clock-rotate-left"></i> Simulation</button>
       </div>
       <div class="title-glow">SDN Intelligence Center</div>
    </div>

    <!-- Main Topology Canvas -->
    <div id="topology-network" class="fullscreen-canvas"></div>
    <div class="status-indicator floating-status">
       <div class="status-dot tooltip" id="topo-status-dot"></div>
       <span id="topo-status-text">Fetching topology data...</span>
    </div>

    <!-- Floating Panels -->
    <!-- Control Panel -->
    <div class="floating-panel control-panel">
       <h3><i class="fa-solid fa-shield"></i> Security & Link</h3>
       <div class="form-group">
          <input type="text" id="ip" placeholder="Enter IP (e.g 10.0.0.1)" />
       </div>
       <div class="button-group">
          <button class="block-btn" onclick="blockIP()">Block</button>
          <button class="unblock-btn" onclick="unblockIP()">Unblock</button>
       </div>
       <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;" />
       <div class="form-group">
          <select id="link-selector">
             <option value="">-- Menunggu Topologi --</option>
          </select>
       </div>
       <div class="button-group">
          <button class="block-btn" onclick="controlPort('down')" style="background: #be123c;">Cut</button>
          <button class="unblock-btn" onclick="controlPort('up')" style="background: #047857;">Restore</button>
       </div>
       <div id="result">Ready...</div>
    </div>

    <!-- Metrics Panel -->
    <div class="floating-panel metrics-panel">
        <h3><i class="fa-solid fa-chart-line"></i> Grafana Metrics</h3>
        <div class="grafana-container">
           <iframe src="http://103.183.74.87:3000/public-dashboards/8bc610f47c9b4b6a9c077196f287a392"></iframe>
        </div>
    </div>

    <!-- Bottom Toolbar -->
    <div class="bottom-toolbar">
       <button class="tool-btn"><i class="fa-solid fa-camera"></i></button>
       <button class="tool-btn"><i class="fa-solid fa-folder"></i></button>
       <button class="tool-btn"><i class="fa-solid fa-satellite-dish"></i></button>
       <button class="tool-btn"><i class="fa-solid fa-gear"></i></button>
    </div>

    <script src="{% static 'js/script.js' %}?v=3"></script>
  </body>
</html>
