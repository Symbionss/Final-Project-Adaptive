{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SDN Control & Topology Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Vis Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body>
    <h1>SDN Intelligence Center</h1>

    <div class="container">
      <!-- Left Panel: Control -->
      <aside>
        <div class="card">
          <h2>Security Control</h2>
          <div class="form-group">
            <input type="text" id="ip" placeholder="Enter IP Address (e.g. 10.0.0.1)" />
          </div>
          <div class="button-group">
            <button class="block-btn" onclick="blockIP()">Block IP</button>
            <button class="unblock-btn" onclick="unblockIP()">Unblock IP</button>
          </div>
          <div id="result">Response output will appear here...</div>
          
          <h3 style="margin-top:25px; margin-bottom:10px; font-size:1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom:8px; display:flex; align-items:center; gap:8px;">
             Link Status Control
          </h3>
          <div class="form-group" style="margin-bottom: 15px;">
            <select id="link-selector" style="width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px 16px; border-radius: 8px; font-family: inherit; font-size: 0.95rem; outline: none;">
               <option value="">-- Menunggu Data Topologi --</option>
            </select>
          </div>
          <div class="button-group">
            <button class="block-btn" onclick="controlPort('down')" style="background: #be123c;">Cut Link</button>
            <button class="unblock-btn" onclick="controlPort('up')" style="background: #047857;">Restore Link</button>
          </div>
        </div>
      </aside>

      <!-- Right Panel: Vis & Monitoring -->
      <main class="main-content">
        <div class="card">
          <h2>Network Topology</h2>
          <div class="legend-container">
            <div class="legend-item"><div class="legend-color" style="background: #2563eb; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div><span>Switch</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #059669; border-radius: 50%;"></div><span>Host</span></div>
            <div class="legend-item"><div class="legend-line" style="background: #10b981;"></div><span>Main Link (Cepat)</span></div>
            <div class="legend-item"><div class="legend-line" style="background: #f59e0b;"></div><span>Backup Link (Lambat)</span></div>
            <div class="legend-item"><div class="legend-line" style="background: #94a3b8;"></div><span>Unknown Link</span></div>
            <div class="legend-item"><div class="legend-dashed"></div><span>Kabel Host</span></div>
          </div>
          <div id="topology-network"></div>
          <div class="status-indicator">
            <div class="status-dot tooltip" id="topo-status-dot"></div>
            <span id="topo-status-text">Fetching topology data...</span>
          </div>
        </div>

        <div class="card" style="padding: 0; border: none; background: transparent; box-shadow: none;">
          <h2 style="padding: 0 10px;">Metrics & Monitoring</h2>
          <div class="grafana-container">
            <iframe src="http://103.183.74.87:3000/public-dashboards/8bc610f47c9b4b6a9c077196f287a392"></iframe>
          </div>
        </div>
      </main>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
