{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SDN Control & Topology Dashboard</title>
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vis Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <!-- Added cache busting v=3 to ensure refresh -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=4">
  </head>
  <body>
    <!-- Overlay UI Header -->
    <div class="top-nav">
       <div class="toggle-group">
          <button class="toggle-btn" id="btn-grafana"><i class="fa-solid fa-chart-line"></i> Tampilkan Grafana</button>
          <button class="toggle-btn" id="btn-perf"><i class="fa-solid fa-satellite-dish"></i> Status Sinyal</button>
       </div>
       <div class="title-glow">SDN Intelligence Center</div>
    </div>

    <!-- Main Topology Canvas -->
    <div id="topology-network" class="fullscreen-canvas"></div>
    <div class="status-indicator floating-status">
       <div class="status-dot tooltip" id="topo-status-dot"></div>
       <span id="topo-status-text">Fetching topology data...</span>
    </div>

    <!-- Floating Panels -->

    <!-- Metrics Panel (Grafana) -->
    <div class="floating-panel metrics-panel panel-hidden" id="panel-grafana">
        <h3><i class="fa-solid fa-chart-line"></i> Grafana Metrics</h3>
        <div class="grafana-container">
           <iframe src="http://103.183.74.87:3000/public-dashboards/8bc610f47c9b4b6a9c077196f287a392"></iframe>
        </div>
    </div>

    <!-- Performance Panel (Simulated) -->
    <div class="floating-panel metrics-panel panel-hidden" id="panel-perf">
        <h3><i class="fa-solid fa-gauge-high"></i> Signal Performance</h3>
        <div class="perf-stats">
           <div class="perf-item">
              <span class="perf-label">Latency</span>
              <span class="perf-value" id="sim-latency">12 ms</span>
           </div>
           <div class="perf-item">
              <span class="perf-label">Throughput</span>
              <span class="perf-value" id="sim-throughput">1.2 Gbps</span>
           </div>
           <div class="perf-item">
              <span class="perf-label">Jitter</span>
              <span class="perf-value" id="sim-jitter">2 ms</span>
           </div>
        </div>
    </div>

    <!-- Bottom Toolbar -->
    <div class="bottom-toolbar">
       <button class="tool-btn"><i class="fa-solid fa-camera"></i></button>
       <button class="tool-btn"><i class="fa-solid fa-folder"></i></button>
       <button class="tool-btn"><i class="fa-solid fa-satellite-dish"></i></button>
       <button class="tool-btn"><i class="fa-solid fa-gear"></i></button>
    </div>

    <script src="{% static 'js/script.js' %}?v=4"></script>
  </body>
</html>
