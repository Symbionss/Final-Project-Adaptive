{% extends "base.html" %}

{% block page_title %}Grafana Metrics Monitoring{% endblock %}

{% block content %}
<!-- Info bar -->
<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:12px;">
    <div style="font-size:0.875rem; color:var(--text-secondary); display:flex; align-items:center; gap:8px;">
        <i class="ph ph-info-circle"></i>
        Dashboard realtime SDN Network Monitoring dari Grafana.
        <a href="{{ grafana_base_url }}" target="_blank" style="color:var(--primary-blue); text-decoration:none;">
            <i class="ph ph-arrow-square-out"></i> Buka Grafana
        </a>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <span style="font-size:0.8rem; color:var(--text-secondary);">Login: <strong style="color:var(--text-primary);">admin / admin123</strong></span>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--success-color);box-shadow:0 0 6px var(--success-color);"></div>
        <span style="font-size:0.8rem; color:var(--success-color);">Live</span>
    </div>
</div>

<!-- Grafana iframe - server-side URL, same on all devices -->
<div class="card" style="flex:1; padding:0; overflow:hidden; min-height:0; position:relative;">
    <iframe
        id="grafana-iframe"
        src="{{ grafana_embed_url }}"
        style="width:100%; height:100%; min-height:750px; border:none; background:#111827;"
        allowtransparency="true"
    ></iframe>
</div>
{% endblock %}
