<!doctype html>
<html>
  <head>
    <title>SDN Dashboard</title>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      .card {
        border: 1px solid #ccc;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
      }

      input {
        padding: 8px;
        width: 200px;
      }

      button {
        padding: 8px 12px;
        margin-left: 5px;
        cursor: pointer;
      }

      #result {
        margin-top: 10px;
        font-weight: bold;
      }

      iframe {
        border: none;
      }
    </style>
  </head>
  <body>
    <h1>SDN Control Dashboard</h1>

    <div class="card">
      <h2>Control Panel</h2>

      <input type="text" id="ip" placeholder="Masukkan IP" />

      <button onclick="blockIP()">Block IP</button>
      <button onclick="unblockIP()">Unblock IP</button>

      <div id="result"></div>
    </div>

    <div class="card">
      <h2>Monitoring (Grafana)</h2>

      <iframe
        src="http://103.183.74.87:3000/public-dashboards/8bc610f47c9b4b6a9c077196f287a392"
        width="100%"
        height="800"
      >
      </iframe>
    </div>

    <script>
      function blockIP() {
        let ip = document.getElementById("ip").value;

        fetch("/block_ip", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ip: ip }),
        })
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("result").innerText = JSON.stringify(
              data,
              null,
              2,
            );
          });
      }

      function unblockIP() {
        let ip = document.getElementById("ip").value;

        fetch("/unblock_ip", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ip: ip }),
        })
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("result").innerText = JSON.stringify(
              data,
              null,
              2,
            );
          });
      }
    </script>
  </body>
</html>
